apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: higress-gw
  namespace: higress-system
spec:
  gatewayClassName: higress
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: All

---

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-route
  namespace: app
spec:
  parentRefs:
  - name: higress-gw
    namespace: higress-system
    sectionName: http
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /httpbin
    backendRefs:
    - name: httpbin
      port: 80
    filters:
    - type: RequestHeaderModifier
      requestHeaderModifier:
        add:
        - name: X-Gateway-Engine
          value: Higress-GatewayAPI
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /

---

apiVersion: extensions.higress.io/v1alpha1
kind: WasmPlugin
metadata:
  name: my-header
  namespace: higress-system
spec:
  url: oci://quay.io/skeeey/higress-test:v0.1.0
  matchRules:
  - ingress:
    - app/app-route
    config:
      request_header_name: X-My-Request
      request_header_value: hello-from-my-wasm-plugin
      response_header_name: X-My-Response
      response_header_value: hello-from-my-wasm-plugin
